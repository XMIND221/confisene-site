<!doctype html>
<html lang="fr">
<head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Galerie — CONFISEN Bégué</title>
    <meta name="description" content="Galerie photos et vidéos des produits Bégué et de l'usine CONFISEN, Dakar Sénégal." />
    <link rel="icon" href="../img/logo.png" />
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@400;600;700&display=swap" rel="stylesheet" />
    <link href="../css/confisene-modern.css" rel="stylesheet" />
    <link href="js/lightboxed/lightboxed.css" rel="stylesheet" />
    <script src="https://ajax.googleapis.com/ajax/libs/jquery/3.6.0/jquery.min.js"></script>
    <script src="js/lightboxed/lightboxed.js"></script>
</head>
<body class="confisene-gallery">
    <header class="confisene-gallery-header">
        <img src="../img/logo.png" alt="Logo CONFISEN" width="80" height="80" style="margin-bottom: 1rem;" />
        <h1>GALERIE</h1>
        <p>Produits Bégué, usine et vidéos CONFISEN</p>
    </header>

    <nav class="confisene-gallery-nav">
        <a class="btn-primary" href="../index.html">RETOUR</a>
    </nav>

    <main class="confisene-gallery-body confisene-gallery">
        <div id="carbon-block" style="margin:20px auto"></div>
        <div style="margin:30px auto"></div>

        <h2 class="confisene-gallery-section-title">PRODUITS</h2>
        <div class="confisene-gallery-grid wow fadeInUp">
            <img class="lightboxed" rel="group1" src="../img/5.jpg" data-link="../img/5.jpg" alt="Image Alt" data-caption="Image Caption" />
            <img class="lightboxed" rel="group1" src="../img/6.jpg" data-link="../img/6.jpg" alt="Image Alt" data-caption="Image Caption" />
            <img class="lightboxed" rel="group1" src="../img/7.jpg" data-link="../img/7.jpg" alt="Image Alt" data-caption="Image Caption" />
            <img class="lightboxed" rel="group1" src="../img/8.jpg" data-link="../img/8.jpg" alt="Image Alt" data-caption="Image Caption" />
            <img class="lightboxed" rel="group1" src="../img/1.png" data-link="../img/1.png" alt="Image Alt" data-caption="Image Caption" />
            <img class="lightboxed" rel="group1" src="../img/2.jpg" data-link="../img/2.jpg" alt="Image Alt" data-caption="Image Caption" />
            <!-- <img class="lightboxed" rel="group1" src="../img/3.jpg" data-link="../img/3.jpg" alt="Image Alt" data-caption="Image Caption" /> -->
            <!-- <img class="lightboxed" rel="group1" src="../img/4.jpg" data-link="../img/4.jpg" alt="Image Alt" data-caption="Image Caption" /> -->
            <img class="lightboxed" rel="group1" src="../img/sucet (1).png" data-link="../img/sucet (1).png" data-caption="Image Caption" alt="Sucette Bégué" />
            <img class="lightboxed" rel="group1" src="../img/bon.png" data-link="../img/bon.png" alt="Image Alt" data-caption="Image Caption" />
            <img class="lightboxed" rel="group1" src="../img/bon1.PNG" data-link="../img/bon1.PNG" alt="Image Alt" data-caption="Image Caption" />
        </div>

        <h2 class="confisene-gallery-section-title">USINE</h2>
        <div class="confisene-gallery-grid wow fadeInUp">
            <img class="lightboxed" rel="group1" src="../img/us1.JPG" data-link="../img/us1.JPG" alt="Image Alt" data-caption="Image Caption" />
            <img class="lightboxed" rel="group1" src="../img/us2.JPG" data-link="../img/us2.JPG" alt="Image Alt" data-caption="Image Caption" />
            <img class="lightboxed" rel="group1" src="../img/us3.JPG" data-link="../img/us3.JPG" alt="Image Alt" data-caption="Image Caption" />
            <img class="lightboxed" rel="group1" src="../img/us4.JPG" data-link="../img/us4.JPG" alt="Image Alt" data-caption="Image Caption" />
            <img class="lightboxed" rel="group1" src="../img/us5.JPG" data-link="../img/us5.JPG" alt="Image Alt" data-caption="Image Caption" />
            <img class="lightboxed" rel="group1" src="../img/us6.JPG" data-link="../img/us6.JPG" alt="Image Alt" data-caption="Image Caption" />

            <img class="lightboxed" rel="group1" src="../img/us12.JPG" data-link="../img/us12.JPG" alt="Image Alt" data-caption="Image Caption" />
        </div>

        <h2 class="confisene-gallery-section-title">VIDEOS</h2>
        <div class="confisene-gallery-videos lightboxed" data-wow-delay="0.5s">
            <video width="400" height="300" controls>
                <source src="../videos/gin.mp4" type="video/mp4" />
            </video>
            <video width="400" height="300" controls>
                <source src="../videos/gin2.mp4" type="video/mp4" />
            </video>
            <video width="400" height="300" controls>
                <source src="../videos/gin3.mp4" type="video/mp4" />
            </video>
            <video width="400" height="300" controls>
                <source src="../videos/suc.mp4" type="video/mp4" />
            </video>
        </div>

        <nav class="confisene-gallery-nav" style="margin-top: 3rem;">
            <a class="btn-primary" href="../index.html">RETOUR</a>
        </nav>
